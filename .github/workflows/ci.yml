name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --locked --dev --python 3.11
      - run: uv run --python 3.11 pytest
      - run: uv run --python 3.11 ruff check src tests
      - run: uv run --python 3.11 ruff format --check src tests
      - run: uv run --python 3.11 pyright
      - run: uv run --python 3.11 vulture src tests --min-confidence 80
